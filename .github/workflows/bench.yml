on:
  push:
  pull_request:
  workflow_dispatch:
    
name: benchmark
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      #
      # Racket
      #
      - uses: Bogdanp/setup-racket@v1.7
        with:
          architecture: "x64"
          distribution: "full"
          version: "current"

      - name: Install dependencies
        run: raco pkg install --auto roulette-lib/ roulette/ benchmark_ci/ gtp-plot gtp-util

      - name: Run benchmarks
        run: cd roulette/benchmark && ./run_benchmarks.sh

      - name: Checkout benchmark data repository
        uses: actions/checkout@v4
        with:
          repository: "Smaran-Teja/roulette-bench-data"
          path: "roulette-bench-data" # This will be a subdirectory
          token: ${{ secrets.PAT }} # MUST use PAT for push permissions
          persist-credentials: true # Keep credentials for push

      - name: log
        run: |
          echo "Current directory: $(pwd)"
          echo "Output of ls: $(ls -la)"

      - name: Copy results to benchmark data repository
        run: rsync -av roulette/benchmark/ roulette-bench-data/; mkdir roulette-bench-data/extra; rsync -av roulette/extra roulette-bench-data/extra

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          cd roulette-bench-data
          git add .
          git commit -m "push benchmark results"
          git push
