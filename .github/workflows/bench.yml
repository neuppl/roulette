on:
  workflow_dispatch:
  push:
  pull_request:

name: benchmark
jobs:
  benchmark:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@master

      # Racket
      #
      # setup-racket normally installs into a system tool-cache dir and uses
      # sudo for parts of the install. The self-hosted runner has no sudo, so
      # instead we install into a workspace-local directory and wipe it first
      # to guarantee a fresh Racket + package set on every run (this runner's
      # workspace persists across jobs, unlike GitHub-hosted runners).

      - name: Clean previous Racket install
        run: rm -rf "${{ github.workspace }}/.racket" "${{ github.workspace }}/.racket-addon"

      - uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: "x64"
          distribution: "full"
          version: "current"
          dest: "${{ github.workspace }}/.racket"
          sudo: never

      - name: Point package installs at a fresh addon dir
        run: echo "PLTADDONDIR=${{ github.workspace }}/.racket-addon" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: raco pkg install --auto roulette-lib/ roulette/ gtp-util gtp-plot markdown

      - name: Run benchmarks
        run: cd roulette/benchmark && racket run_benchmarks.rkt ${{github.sha}} "${{ github.event.head_commit.message }}"

      - name: Checkout benchmark data repository
        uses: actions/checkout@v7
        with:
          repository: "Smaran-Teja/roulette-bench-data"
          path: "roulette-bench-data" # This will be a subdirectory
          token: ${{ secrets.PAT }} # MUST use PAT for push permissions
          persist-credentials: true # Keep credentials for push

      - name: log
        run: |
          echo "Current directory: $(pwd)"
          echo "Output of ls: $(ls -la)"

      - name: Copy results to benchmark data repository
        run: |
          mkdir -p roulette-bench-data/extra roulette-bench-data/benchmark
          rsync -av roulette/benchmark/ roulette-bench-data/benchmark
          rsync -av roulette/extra/ roulette-bench-data/extra

      - name: Generate Scribble docs
        run: |
          cp roulette/site.scribl roulette-bench-data/site.scribl
          cd roulette-bench-data
          raco scribble --htmls site.scribl

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          cd roulette-bench-data
          git add .
          git commit -m "push benchmark results"
          git push
